<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Voting System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #3a6186, #89253e);
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .main-content {
      margin-top: 10%;
    }
    .card {
      background-color: rgba(255, 255, 255, 0.1);
      border: none;
      padding: 40px;
      border-radius: 15px;
    }
    .btn-custom {
      background-color: #ffffff;
      color: #89253e;
      border: none;
      font-weight: bold;
    }
    .btn-custom:hover {
      background-color: #f1f1f1;
    }

    .card p, .card h1 {
  color: white;
}

body.dark-mode .card p, 
body.dark-mode .card h1 {
  color: white;
}


    /* Dark mode overrides */
    body.dark-mode {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }
    body.dark-mode .card {
      background-color: rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .btn-custom {
      background-color: #fff;
      color: #2c5364;
    }
  </style>
</head>
<body>

  <!-- 🌓 Dark Mode Toggle -->
  <div class="container mt-3 text-end">
    <button class="btn btn-outline-light btn-sm" id="darkToggle" onclick="toggleDarkMode()">🌓 Toggle Dark Mode</button>
  </div>

  <div class="container main-content">
    <div class="row justify-content-center text-center">
      <div class="col-md-8">
        <div class="card shadow-lg">
          <h1 class="mb-4">Welcome to the Secure Online Voting System 🗳️</h1>
          <p>This system uses facial recognition to ensure a secure, one-person-one-vote process. Please register and vote with your face and unique ID.</p>
          <div class="d-grid gap-3 mt-4">
            <a href="/register" class="btn btn-custom btn-lg">Register</a>
            <a href="/login" class="btn btn-outline-light btn-lg">Login & Vote</a>
            <a href="/results" class="btn btn-outline-light btn-sm mt-3">View Results</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🌙 Dark Mode Script -->
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem("darkMode", isDark ? "enabled" : "disabled");
      document.getElementById("darkToggle").innerText = isDark ? "☀️ Light Mode" : "🌓 Toggle Dark Mode";
    }

    window.onload = function () {
      if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        document.getElementById("darkToggle").innerText = "☀️ Light Mode";
      }
    };
  </script>

</body>
</html>
