<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Election Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      margin-top: 60px;
    }
    .card {
      background-color: rgba(255, 255, 255, 0.05);
      border: none;
      border-radius: 12px;
      padding: 30px;
    }
    table {
      background-color: transparent;
      color: white;
    }
    th, td {
      text-align: center;
      font-size: 1.1rem;
    }
    .btn-home {
      background-color: white;
      color: #243b55;
      border: none;
      font-weight: bold;
    }
    .btn-home:hover {
      background-color: #eee;
    }

    /* 🌙 Dark Mode Styles */
    body.dark-mode {
      background: linear-gradient(to right, #000428, #004e92);
      color: #fff;
    }
    body.dark-mode .card {
      background-color: rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .btn-home {
      background-color: #f0f0f0;
      color: #000428;
    }
  </style>
</head>
<body>

  <!-- 🌗 Dark Mode Toggle -->
  <div class="container text-end mt-3">
    <button class="btn btn-outline-light btn-sm" id="darkToggle" onclick="toggleDarkMode()">🌓 Toggle Dark Mode</button>
  </div>

  <div class="container text-center">
    <div class="card">
      <h2 class="mb-4">📊 Live Election Results</h2>
      <table class="table table-bordered table-hover table-striped table-dark">
        <thead>
          <tr>
            <th>Candidate</th>
            <th>Votes</th>
          </tr>
        </thead>
        <tbody>
          {% for name, votes in results %}
          <tr>
            <td>{{ name }}</td>
            <td>{{ votes }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <a href="/" class="btn btn-home mt-4">← Back to Home</a>
    </div>
  </div>

  <!-- 🌙 Dark Mode Script -->
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem("darkMode", isDark ? "enabled" : "disabled");
      document.getElementById("darkToggle").innerText = isDark ? "☀️ Light Mode" : "🌓 Toggle Dark Mode";
    }

    window.onload = function () {
      if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        document.getElementById("darkToggle").innerText = "☀️ Light Mode";
      }
    };
  </script>

</body>
</html>
