<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vote - Smart Voting</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f1f4f9;
      transition: background 0.4s ease, color 0.4s ease;
    }
    .card {
      margin-top: 40px;
      padding: 20px;
      transition: background 0.4s ease, color 0.4s ease;
    }
    #countdown {
      font-weight: bold;
      color: red;
    }

    /* 🌙 Dark Mode Styling */
    body.dark-mode {
      background-color: #121212;
      color: #ffffff;
    }
    body.dark-mode .card {
      background-color: #1e1e1e;
      color: #ffffff;
    }
    body.dark-mode .form-check-label,
    body.dark-mode .form-check-input {
      color: #ffffff;
    }
    body.dark-mode .btn {
      border-color: #fff;
    }

    /* 🔄 Loader Overlay */
    #loaderOverlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.7);
      top: 0;
      left: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    body.dark-mode #loaderOverlay {
      background: rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>

  <!-- 🌗 Dark Mode Toggle -->
  <div class="container mt-3 text-end">
    <button class="btn btn-outline-dark btn-sm" id="darkToggle" onclick="toggleDarkMode()">🌓 Toggle Dark Mode</button>
  </div>

  <div class="container">
    <h2 class="text-center mt-2">🗳️ Cast Your Vote</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info alert-dismissible fade show mt-3" role="alert">
          {{ messages[0] }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endif %}
    {% endwith %}

    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div id="countdown" class="text-end mb-3">⏳ Time left: 60s</div>
          <form id="voteForm" method="POST">
            <div class="mb-3">
              <label class="form-label">Choose your candidate:</label>
              {% for id, name in candidates %}
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="candidate" id="candidate{{ id }}" value="{{ id }}" required>
                  <label class="form-check-label" for="candidate{{ id }}">{{ name }}</label>
                </div>
              {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Submit Vote</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 🔄 Loading Spinner -->
  <div id="loaderOverlay">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- 🌗 Dark Mode Script -->
  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      localStorage.setItem("darkMode", isDark ? "enabled" : "disabled");
      document.getElementById("darkToggle").innerText = isDark ? "☀️ Light Mode" : "🌓 Toggle Dark Mode";
    }

    window.onload = function () {
      if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
        document.getElementById("darkToggle").innerText = "☀️ Light Mode";
      }
    };
  </script>

  <!-- ⏳ Countdown Timer -->
  <script>
    let timeLeft = 60;
    const countdown = setInterval(() => {
      const counter = document.getElementById("countdown");
      if (timeLeft <= 0) {
        clearInterval(countdown);
        alert("⏰ Time expired! Redirecting to login...");
        window.location.href = "/login";
      } else {
        counter.innerText = `⏳ Time left: ${timeLeft}s`;
        timeLeft--;
      }
    }, 1000);
  </script>

  <!-- 📤 Show Loader on Submit -->
  <script>
    document.getElementById("voteForm").addEventListener("submit", function () {
      document.getElementById("loaderOverlay").style.display = "flex";
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
